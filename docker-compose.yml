version: '3.8'
# =========================================================
# Silver Guard · Docker Compose 本地开发/测试环境
# 一键启动：前端管理后台 + Mock API + MySQL + Redis
#
# 使用：
#   docker compose up -d
#   docker compose logs -f app  # 查看某个服务日志
#   docker compose ps           # 所有服务状态
#   docker compose down         # 停止（保留数据）
#   docker compose down -v      # 停止 + 删除数据卷（清库）
#
# 访问地址：
#   管理后台   → http://localhost:8091/
#   Mock API   → http://localhost:8090/api/...
#   Actuator   → http://localhost:8090/actuator/health
#   MySQL      → 本机: 3316  /  容器内: 3306
#   Redis      → 本机: 6389  /  容器内: 6379
#   测试账号   → 13800000001 / password123
# =========================================================

services:

  # ---- MySQL 8.0 主数据库 ----
  mysql:
    image: mysql:8.0
    container_name: silver-guard-mysql
    restart: unless-stopped
    ports:
      - "3316:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=silver_guard
      - MYSQL_USER=silver_guard_app
      - MYSQL_PASSWORD=${DB_APP_PASSWORD}
      - TZ=Asia/Shanghai
      - MYSQL_DEFAULT_AUTHENTICATION_PLUGIN=mysql_native_password
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
      - --innodb-buffer-pool-size=128M
      - --innodb-log-file-size=48M
      - --max-connections=200
      - --slow-query-log=1
      - --slow-query-log-file=/var/log/mysql/slow.log
      - --long-query-time=1
    volumes:
      - ./sql:/docker-entrypoint-initdb.d
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "silver_guard_app", "-p${DB_APP_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
    networks:
      - silver-guard-net

  # ---- Redis 缓存 ----
  redis:
    image: redis:7-alpine
    container_name: silver-guard-redis
    restart: unless-stopped
    ports:
      - "6389:6379"
    command:
      - --requirepass ${REDIS_PASSWORD}
      - --maxmemory=256mb
      - --maxmemory-policy=allkeys-lru
      - --appendonly=yes
      - --appendfsync=everysec
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - silver-guard-net

  # ---- Mock API（Node.js + Express，后端 API 服务）----
  mock-api:
    build:
      context: .
      dockerfile: mock-api/Dockerfile
    container_name: silver-guard-mock-api
    restart: unless-stopped
    ports:
      - "8090:8080"
    environment:
      - PORT=8080
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=silver_guard_app
      - MYSQL_PASSWORD=${DB_APP_PASSWORD}
      - MYSQL_DATABASE=silver_guard
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - TZ=Asia/Shanghai
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 15s
    networks:
      - silver-guard-net

  # ---- Admin 管理后台（React + Nginx）----
  admin:
    build:
      context: .
      dockerfile: silver-guard-admin/Dockerfile
    container_name: silver-guard-admin
    restart: unless-stopped
    ports:
      - "8091:80"
    depends_on:
      mock-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - silver-guard-net

networks:
  silver-guard-net:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
