# =========================================================
# 乐龄守护 · Docker Compose 本地开发/测试环境
# 一键启动：前端管理后台 + Node.js 后端 + MySQL + Redis
#
# 使用：
#   docker compose up -d
#   docker compose logs -f server     # 查看后端服务日志
#   docker compose ps                 # 所有服务状态
#   docker compose down               # 停止（保留数据）
#   docker compose down -v            # 停止 + 删除数据卷（清库）
#
# 访问地址：
#   管理后台   → http://localhost:8091/
#   后端 API   → http://localhost:8090/api/...
#   Actuator   → http://localhost:8090/actuator/health
#   MySQL      → 本机: 3316  /  容器内: 3306  (用户: leLing_guardian_app / app1234)
#   Redis      → 本机: 6389  /  容器内: 6379  (无密码)
#   测试账号   → 13800000001 / password123
#
# 环境变量（可选，在项目根目录创建 .env 文件可覆盖默认值）：
#   MYSQL_ROOT_PASSWORD  → MySQL root 密码（默认 root1234）
#   DB_APP_PASSWORD      → MySQL leLing_guardian_app 用户密码（默认 app1234）
#   REDIS_PASSWORD       → Redis 密码（默认空，即无密码）
#   JWT_SECRET           → JWT 签名密钥（默认 leLing-guardian-dev-secret-change-in-prod）
# =========================================================

services:

  # ---- MySQL 8.0 主数据库 ----
  mysql:
    image: mysql:8.0
    container_name: leling-guardian-mysql
    restart: unless-stopped
    ports:
      - "3316:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root1234}
      MYSQL_DATABASE: leling-guardian
      MYSQL_USER: leling-guardian_app
      MYSQL_PASSWORD: ${DB_APP_PASSWORD:-app1234}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
      - --innodb-buffer-pool-size=128M
      - --innodb-log-file-size=48M
      - --max-connections=200
    volumes:
      - ./sql:/docker-entrypoint-initdb.d
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "leling-guardian_app", "-p${DB_APP_PASSWORD:-app1234}"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
    networks:
      - leling-guardian-net

  # ---- Redis 缓存（本地开发无密码）----
  redis:
    image: redis:7-alpine
    container_name: leling-guardian-redis
    restart: unless-stopped
    ports:
      - "6389:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --appendonly yes --appendfsync everysec
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - leling-guardian-net

  # ---- Node.js 后端服务 ----
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: leling-guardian-server
    restart: unless-stopped
    ports:
      - "8090:8080"
    environment:
      PORT: 8080
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: leling-guardian_app
      MYSQL_PASSWORD: ${DB_APP_PASSWORD:-app1234}
      MYSQL_DATABASE: leling-guardian
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET:-leling-guardian-dev-secret-change-in-prod}
      TZ: Asia/Shanghai
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 15s
    networks:
      - leling-guardian-net

  # ---- Admin 管理后台（React + Nginx）----
  admin:
    build:
      context: .
      dockerfile: leling-guardian-admin/Dockerfile
    container_name: leling-guardian-admin
    restart: unless-stopped
    ports:
      - "8091:80"
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - leling-guardian-net

networks:
  leling-guardian-net:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
