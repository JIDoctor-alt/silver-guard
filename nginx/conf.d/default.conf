# =========================================================
# Silver Guard · API 反向代理配置
# =========================================================

upstream silver_guard_app {
    server app:8080;
    keepalive 32;
}

server {
    listen 80;
    server_name localhost;

    # API 路由
    location /api/ {
        proxy_pass http://silver_guard_app/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # 超时配置
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # 缓冲配置
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 32k;
    }

    # Actuator 健康检查（仅内部访问）
    location /actuator/ {
        proxy_pass http://silver_guard_app/actuator/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Knife4j API 文档
    location /doc.html {
        proxy_pass http://silver_guard_app/doc.html;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /swagger-resources {
        proxy_pass http://silver_guard_app/swagger-resources;
        proxy_http_version 1.1;
    }

    location /v3/api-docs {
        proxy_pass http://silver_guard_app/v3/api-docs;
        proxy_http_version 1.1;
    }

    location /webjars/ {
        proxy_pass http://silver_guard_app/webjars/;
        proxy_http_version 1.1;
    }

    # 默认根路径（前端静态资源预留）
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # 错误页面
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}