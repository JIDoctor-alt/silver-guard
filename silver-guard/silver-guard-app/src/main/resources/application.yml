# =========================================================
# Silver Guard · application.yml（测试环境配置）
# 路径：silver-guard-app/src/main/resources/application.yml
# 环境激活：spring.profiles.active=test
# =========================================================

spring:
  application:
    name: silver-guard

  # ============================================================
  # 数据库配置（MyBatis Flex）
  # ============================================================
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:silver_guard}\
         ?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai\
         &allowPublicKeyRetrieval=true&useSSL=false
    username: ${DB_USERNAME:test_user}
    password: ${DB_PASSWORD:test1234}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: SilverGuardHikariCP

  # MyBatis Flex 配置
  mybatis-flex:
    configuration-map:
      default:
        log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
        map-underscore-to-camel-case: true
        cache-enabled: true
        aggressive-lazy-loading: false
    global-config:
      id-type: INPUT

  # ============================================================
  # Redis 配置（Redisson + 多级缓存）
  # ============================================================
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 3000ms

  # Caffeine 本地缓存配置
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=5m

  # ============================================================
  # LLM / AI 配置（LangChain4j + Spring AI Alibaba）
  # ============================================================
  ai:
    alibaba:
      api-key: ${LLM_API_KEY:dummy-key}
      base-url: ${LLM_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
      model: ${LLM_MODEL:qwen-plus}
      max-tokens: 2000
      temperature: 0.3
      timeout: 5000ms

  # ============================================================
  # 通知通道配置
  # ============================================================
  notify:
    sms:
      enabled: true
      provider: aliyun
      endpoint: https://dysmsapi.aliyuncs.com
      access-key: ${SMS_ACCESS_KEY:}
      access-secret: ${SMS_ACCESS_SECRET:}
      sign-name: ${SMS_SIGN_NAME:智护长者}
      template-codes:
        urgent: SMS_XXXXX_URGENT
        normal: SMS_XXXXX_NORMAL
    call:
      enabled: true
      provider: tencent
      endpoint: https://cloud.tim.qq.com
      app-id: ${CALL_APP_ID:}
      app-key: ${CALL_APP_KEY:}
    push:
      enabled: true
      provider: jiguang
      app-key: ${JPUSH_APP_KEY:}
      master-secret: ${JPUSH_MASTER_SECRET:}

  # ============================================================
  # 文件上传
  # ============================================================
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

  # ============================================================
  # 日志配置
  # ============================================================
  logging:
    level:
      root: INFO
      com.silverguard: DEBUG
      com.silverguard.ai: DEBUG
      com.silverguard.infra: INFO
      org.springframework.security: WARN
      org.mybatis: WARN
    pattern:
      console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file:
      name: ${LOG_PATH:/app/logs}/silver-guard.log
      max-size: 100MB
      max-history: 30
    logstash:
      enabled: false

# ============================================================
# 服务器配置
# ============================================================
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,application/javascript,application/json,application/xml
    min-response-size: 1024
  error:
    include-message: never
    include-stacktrace: never

# ============================================================
# Actuator 监控配置
# ============================================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,threaddump,heapdump
      base-path: /actuator
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
        silverguard.*: true
      slo:
        http.server.requests: 50ms,100ms,200ms,500ms,1s,2s,5s
        silverguard.*: 500ms,1s,2s,5s,10s,30s

# ============================================================
# Knife4j API 文档配置
# ============================================================
knife4j:
  enable: true
  setting:
    language: zh_cn
    open-monitor: true
  topics:
    - name: 设备网关
      display-order: 1
    - name: 认证登录
      display-order: 2
    - name: 老人管理
      display-order: 3
    - name: 预警事件
      display-order: 4
    - name: 巡检管理
      display-order: 5
    - name: 通知中心
      display-order: 6
    - name: 驾驶舱报表
      display-order: 7
    - name: 系统管理
      display-order: 8
