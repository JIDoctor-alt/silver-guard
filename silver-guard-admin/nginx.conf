# =========================================================
# 乐龄守护 · Admin 前端 Nginx 配置
# - 静态文件服务（React SPA 构建产物）
# - /api 反向代理到 Node.js 后端服务
# =========================================================

server {
    listen 80;
    server_name _;

    # gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/json application/xml+rss application/javascript;

    # 前端静态文件（Vue/React SPA 风格）
    location / {
        root /usr/share/nginx/html;
        index index.html;
        # SPA history 模式：所有未知路由回退到 index.html
        try_files $uri $uri/ /index.html;

        # 静态资源缓存（10 分钟，HTML 不缓存）
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 10m;
            add_header Cache-Control "public, max-age=600, must-revalidate";
        }

        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }

    # API 反向代理到 Node.js 后端服务
    location /api/ {
        proxy_pass http://server:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 大请求/响应超时
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # 处理 cookie 等头部
        proxy_redirect off;
        proxy_buffering off;
    }

    # Actuator 健康检查透传
    location /actuator/ {
        proxy_pass http://server:8080/actuator/;
        proxy_set_header Host $host;
    }

    # 错误页面
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
