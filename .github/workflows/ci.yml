# =========================================================
# Silver Guard · GitHub Actions CI/CD
# 触发：main 分支 push / PR / Release Tag
# 流程：编译 → 单测 → 静态扫描 → 构建镜像 → 推送 Harbor
# =========================================================

name: Silver Guard CI/CD

on:
  push:
    branches: [main, develop, 'release/**']
  pull_request:
    branches: [main, develop]
  release:
    types: [published]

env:
  # 项目通用
  APP_NAME: silver-guard
  REGISTRY: harbor.your-company.com   # 替换为实际 Harbor 地址
  REGISTRY_USERNAME: ${{ secrets.HARBOR_USERNAME }}
  REGISTRY_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}
  JAVA_VERSION: '21'

jobs:

  # ==========================================================
  # Job 1：编译 + 单元测试
  # ==========================================================
  build:
    name: Build & Test (JDK ${{ env.JAVA_VERSION }})
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root1234
          MYSQL_DATABASE: silver_guard
          MYSQL_USER: test_user
          MYSQL_PASSWORD: test1234
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
          --character-set-server=utf8mb4
          --collation-server=utf8mb4_unicode_ci

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      # Maven 依赖缓存（加速构建）
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      # ===== 编译 =====
      - name: Compile
        run: mvn compile -B -q

      # ===== 单元测试（集成测试用 test 配置文件） =====
      - name: Unit Tests
        run: >-
          mvn test
          -B
          -Dspring.profiles.active=test
          -Dspring.datasource.url=jdbc:mysql://127.0.0.1:3306/silver_guard
          -Dspring.datasource.username=test_user
          -Dspring.datasource.password=test1234
          -Dspring.redis.host=127.0.0.1
          -Dspring.redis.password=
          -DskipITs=true

      # ===== 生成测试报告 =====
      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: target/surefire-reports/*.xml
          retention-days: 7

      # ===== Checkstyle / Alibaba 规范检查 =====
      - name: Checkstyle
        run: mvn checkstyle:check -B -q || true
        continue-on-error: true

      # ===== Spotless 代码格式化检查 =====
      - name: Spotless Check
        run: mvn spotless:check -B || true
        continue-on-error: true

      # ===== Spotless Apply（可选：自动修复格式问题 PR） =====
      - name: Spotless Apply (auto-fix)
        if: github.event_name == 'pull_request'
        run: mvn spotless:apply -B -q
        continue-on-error: true

      # ===== OWASP 依赖安全扫描 =====
      - name: OWASP Dependency Check
        run: >-
          mvn org.owasp:dependency-check-maven:check
          -B
          -Ddependency-check.outputDirectory=target/owasp
          -Ddependency-check.failBuildOnCVSS=8
          -Ddependency-check.assemblyAnalyzerEnabled=false

      - name: Upload OWASP Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-report
          path: target/owasp/*.html
          retention-days: 7

      # ===== 构建 JAR（不跳过测试，CI 中已测） =====
      - name: Package JAR
        run: mvn package -B -DskipTests -Dmaven.javadoc.skip=true

      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/silver-guard-*.jar
          retention-days: 3

  # ==========================================================
  # Job 2：SonarQube 静态分析（可选，需配置 SonarQube Server）
  # ==========================================================
  sonar:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event_name != 'pull_request' }}  # PR 用 GitHub 自带扫描

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: SonarQube Scan
        run: >-
          mvn sonar:sonar
          -B
          -Dsonar.projectKey=silver-guard
          -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }}
          -Dsonar.token=${{ secrets.SONAR_TOKEN }}
          -Dsonar.java.binaries=target/classes
          -Dsonar.sources=src/main/java
          -Dsonar.tests=src/test/java
          -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
        continue-on-error: true

  # ==========================================================
  # Job 3：构建 + 推送 Docker 镜像（仅 main / release 分支）
  # ==========================================================
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/'))

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.REGISTRY_USERNAME }}
          password: ${{ env.REGISTRY_PASSWORD }}

      # ===== 构建多平台镜像（AMD64 + ARM64）=====
      - name: Build and Push (Multi-arch)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/silver-guard/${{ env.APP_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/silver-guard/${{ env.APP_NAME }}:latest
            ${{ env.REGISTRY }}/silver-guard/${{ env.APP_NAME }}:${{ github.ref_name }}
          build-args: |
            JAR_FILE=silver-guard-*.jar
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Image Digest
        run: >-
          echo "Image pushed successfully."
          echo "Tag: ${{ env.REGISTRY }}/silver-guard/${{ env.APP_NAME }}:${{ github.sha }}"

  # ==========================================================
  # Job 4：K8s 部署（仅 Release Tag 触发）
  # ==========================================================
  deploy:
    name: Deploy to K8s (Release Only)
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'release'
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.29'

      - name: Configure Kubeconfig
        uses: azure/k8s-set-context@v3
        with:
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - name: Deploy to Kubernetes
        run: |
          # 替换镜像 TAG
          sed "s|{{IMAGE_TAG}}|${{ env.REGISTRY }}/silver-guard/${{ env.APP_NAME }}:${{ github.sha }}|g" \
              k8s/deployment.yaml | kubectl apply -f -
          kubectl rollout status deployment/silver-guard -n silver-guard --timeout=120s

      - name: Verify Deployment
        run: kubectl get pods -n silver-guard -l app=silver-guard

  # ==========================================================
  # Job 5：通知（构建结果通知到企业微信/钉钉）
  # ==========================================================
  notify:
    name: Build Notification
    runs-on: ubuntu-latest
    needs: [build, docker]
    if: always()

    steps:
      - name: Success Notification
        if: needs.build.result == 'success' && needs.docker.result == 'success'
        run: echo "✅ Build & Docker Build SUCCESS"

      - name: Failure Notification
        if: needs.build.result == 'failure' || needs.docker.result == 'failure'
        run: |
          echo "❌ CI/CD Pipeline FAILED"
          echo "Failed job: ${{ join(needs.*.result, ', ') }}"
          # 可接入飞书/钉钉/Slack Webhook，这里注释示例：
          # curl -X POST ${{ secrets.NOTIFICATION_WEBHOOK }} \
          #   -H 'Content-Type: application/json' \
          #   -d '{"msg_type":"text","content":{"text":"Silver Guard CI/CD FAILED: ${{ github.run_url }}"}}'
